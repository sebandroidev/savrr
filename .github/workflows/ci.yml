name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Fast lane: formatting + core/server/daemon lint & tests on Linux. Does not
  # build the Tauri app (that needs webkit + a built frontend) — see `app`.
  check:
    name: fmt · clippy · test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI/webkit deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libsoup-3.0-dev \
            libssl-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build the frontend (Tauri needs frontendDist to exist)
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/savr-app/ui/pnpm-lock.yaml
      - name: pnpm install & build
        working-directory: crates/savr-app/ui
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: rustfmt
        if: runner.os == 'Linux'
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --workspace --all-features

  # Frontend-only lint/typecheck (svelte-check) so UI errors surface fast.
  frontend:
    name: frontend typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/savr-app/ui/pnpm-lock.yaml
      - working-directory: crates/savr-app/ui
        run: |
          pnpm install --frozen-lockfile
          pnpm run check
          pnpm build

  # Prove the server image still builds (it ships as a container).
  docker:
    name: server image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build savr-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: savr-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
