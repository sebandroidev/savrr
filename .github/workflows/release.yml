name: Release

# Tag a version to cut a release:
#   git tag v0.1.0 && git push origin v0.1.0
# Produces: signed desktop bundles + updater latest.json (GUI), per-OS daemon
# binaries, and a savr-server container image on GHCR.

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
      - uses: actions/github-script@v7
        id: create
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Savr ${tag}`,
              body: 'See [CHANGELOG.md](../blob/main/CHANGELOG.md).',
              draft: true,
              prerelease: false,
            });
            return data.id;

  # Desktop app: signed bundles + updater manifest, per OS.
  build-app:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
          - os: ubuntu-latest
            target: ''
          - os: windows-latest
            target: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libsoup-3.0-dev libssl-dev pkg-config \
            libdbus-1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/savr-app/ui/pnpm-lock.yaml
      - name: Install frontend deps
        working-directory: crates/savr-app/ui
        run: pnpm install --frozen-lockfile

      # Bundle the daemon inside the app: build it for this target and stage it
      # as the Tauri sidecar (binaries/savr-daemon-<triple>[.exe]). The macOS
      # app is universal, so its sidecar must be a universal (lipo'd) binary.
      - name: Build & stage the daemon sidecar
        shell: bash
        run: |
          set -euo pipefail
          DEST="crates/savr-app/src-tauri/binaries"
          mkdir -p "$DEST"
          if [ "${{ matrix.target }}" = "universal-apple-darwin" ]; then
            # A universal build needs all three: a per-arch sidecar for each
            # slice's compile (savr-daemon-<arch>-apple-darwin), AND a lipo'd
            # universal one for the bundling step (…-universal-apple-darwin).
            cargo build --release -p savr-daemon --target aarch64-apple-darwin
            cargo build --release -p savr-daemon --target x86_64-apple-darwin
            cp target/aarch64-apple-darwin/release/savr-daemon "$DEST/savr-daemon-aarch64-apple-darwin"
            cp target/x86_64-apple-darwin/release/savr-daemon "$DEST/savr-daemon-x86_64-apple-darwin"
            lipo -create -output "$DEST/savr-daemon-universal-apple-darwin" \
              "$DEST/savr-daemon-aarch64-apple-darwin" \
              "$DEST/savr-daemon-x86_64-apple-darwin"
          else
            TRIPLE="$(rustc -vV | sed -n 's/^host: //p')"
            EXE=""
            [ "${{ runner.os }}" = "Windows" ] && EXE=".exe"
            cargo build --release -p savr-daemon
            cp "target/release/savr-daemon${EXE}" "$DEST/savr-daemon-${TRIPLE}${EXE}"
          fi

      - name: Build & sign the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/savr-app
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
          args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}

  # Headless daemon: raw per-OS binaries attached to the release.
  build-daemon:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: savr-daemon-linux-x86_64
            ext: ''
          - os: macos-latest
            name: savr-daemon-macos-arm64
            ext: ''
          - os: windows-latest
            name: savr-daemon-windows-x86_64.exe
            ext: '.exe'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libdbus-1-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build daemon
        run: cargo build --release -p savr-daemon
      - name: Stage & upload
        shell: bash
        run: |
          cp "target/release/savr-daemon${{ matrix.ext }}" "${{ matrix.name }}"
          # Several jobs upload to the same draft release at once; GitHub can
          # return a transient 404 under that contention, so retry.
          for attempt in 1 2 3 4 5; do
            if gh release upload "${GITHUB_REF_NAME}" "${{ matrix.name }}" --clobber; then
              exit 0
            fi
            echo "upload attempt $attempt failed; retrying in $((attempt * 5))s"
            sleep $((attempt * 5))
          done
          echo "release upload still failing after retries" >&2
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Server: container image on GitHub Container Registry.
  build-server-image:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase image name
        id: img
        run: echo "repo=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.img.outputs.repo }}/savrr-server:${{ needs.create-release.outputs.version }}
            ghcr.io/${{ steps.img.outputs.repo }}/savrr-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-release:
    needs: [create-release, build-app, build-daemon, build-server-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
