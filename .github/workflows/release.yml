name: Release

# Tag a version to cut a release:
#   git tag v0.1.0 && git push origin v0.1.0
# Produces: a signed Windows desktop installer + updater latest.json (GUI), the
# Windows daemon binary, and a savr-server container image on GHCR. The client
# is Windows-only for now; the server image stays Linux.

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
      - uses: actions/github-script@v7
        id: create
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Savr ${tag}`,
              body: 'See [CHANGELOG.md](../blob/main/CHANGELOG.md).',
              draft: true,
              prerelease: false,
            });
            return data.id;

  # Desktop app (Windows): signed installer + updater manifest.
  build-app:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/savr-app/ui/pnpm-lock.yaml
      - name: Install frontend deps
        working-directory: crates/savr-app/ui
        run: pnpm install --frozen-lockfile

      # Bundle the daemon inside the app: build it and stage it as the Tauri
      # sidecar (binaries/savr-daemon-<triple>.exe).
      - name: Build & stage the daemon sidecar
        shell: bash
        run: |
          set -euo pipefail
          DEST="crates/savr-app/src-tauri/binaries"
          mkdir -p "$DEST"
          TRIPLE="$(rustc -vV | sed -n 's/^host: //p')"
          cargo build --release -p savr-daemon
          cp "target/release/savr-daemon.exe" "$DEST/savr-daemon-${TRIPLE}.exe"

      - name: Build & sign the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/savr-app
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true

  # Headless daemon: the raw Windows binary attached to the release.
  build-daemon:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build daemon
        run: cargo build --release -p savr-daemon
      - name: Stage & upload
        shell: bash
        run: |
          cp "target/release/savr-daemon.exe" "savr-daemon-windows-x86_64.exe"
          # build-app uploads to the same draft release concurrently; GitHub can
          # return a transient 404 under that contention, so retry.
          for attempt in 1 2 3 4 5; do
            if gh release upload "${GITHUB_REF_NAME}" "savr-daemon-windows-x86_64.exe" --clobber; then
              exit 0
            fi
            echo "upload attempt $attempt failed; retrying in $((attempt * 5))s"
            sleep $((attempt * 5))
          done
          echo "release upload still failing after retries" >&2
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Server: container image on GitHub Container Registry.
  build-server-image:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase image name
        id: img
        run: echo "repo=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.img.outputs.repo }}/savrr-server:${{ needs.create-release.outputs.version }}
            ghcr.io/${{ steps.img.outputs.repo }}/savrr-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-release:
    needs: [create-release, build-app, build-daemon, build-server-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
